version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  miner:
    build:
      context: ./miner
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: on-failure

  visualizer:
    build:
      context: ./visualizer
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: on-failure
